<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranzulla Diagnostica - Demo Agentforce</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VARIABILI COLORI BASE DAL SITO ORIGINALE --- */
        :root {
            --aranzulla-green: #74b5a1; /* Verde salvia del logo e footer */
            --aranzulla-dark: #2c3e45;  /* Grigio scuro dell'header */
            --aranzulla-top: #223136;   /* Grigio scurissimo della top bar */
            --text-light: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- TOP BAR PICCOLA --- */
        .top-bar {
            background-color: var(--aranzulla-top);
            color: var(--text-light);
            font-size: 11px;
            padding: 5px 30px;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }
        .top-bar div { display: flex; align-items: center; gap: 5px; cursor: pointer; }

        /* --- HEADER E NAVIGAZIONE --- */
        header {
            background-color: var(--aranzulla-dark);
            height: 80px;
            display: flex;
            align-items: stretch;
        }

        .logo-container {
            background-color: var(--aranzulla-green);
            width: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }
        
        /* Stile per l'immagine del logo */
        .logo-container img {
            max-width: 80%;
            height: auto;
        }

        nav {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        nav ul li {
            color: var(--text-light);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
        }
        
        nav ul li i { margin-left: 3px; font-size: 9px; }

        /* --- HERO SECTION CON IMMAGINE ORIGINALE --- */
        .hero {
            flex-grow: 1;
            /* Inserita l'immagine originale della clinica con un filtro scuro per far leggere il testo */
            background-image: linear-gradient(rgba(44, 62, 69, 0.6), rgba(44, 62, 69, 0.4)), url('DSC7469_1.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 60px;
            position: relative;
        }

        .hero h1 {
            color: white;
            font-size: 42px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0;
        }

        /* --- BOTTOM BAR VERDE --- */
        .bottom-bar {
            background-color: var(--aranzulla-green);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px 0;
            color: white;
        }

        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-align: center;
        }

        .bottom-item i { font-size: 24px; }
        .bottom-item span { font-size: 13px; font-weight: 400; line-height: 1.4;}

        /* --- BOTTONE WHATSAPP FAKE --- 
        .whatsapp-float {
            position: fixed;
            width: 55px;
            height: 55px;
            bottom: 80px; 
            right: 30px;
            background-color: #64d448; 
            color: #FFF;
            border-radius: 5px; 
            text-align: center;
            font-size: 35px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.05);
        }
        */

        /* Icona accessibilità finta sotto WA */
        .accessibility-float {
            position: fixed;
            width: 40px;
            height: 40px;
            bottom: 30px;
            right: 38px;
            background-color: white;
            color: var(--aranzulla-green);
            border-radius: 5px;
            text-align: center;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            z-index: 999;
        }

        /* BOTTONE WHATSAPP FLOTTANTE */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 30px;
            right: 30px;
            background-color: #25d366; /* Verde ufficiale WhatsApp */
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 35px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .whatsapp-float:hover {
            background-color: #128c7e;
            transform: scale(1.1);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* NASCONDE IL BOTTONE STANDARD DI SALESFORCE */

        /* Per le versioni standard */
        .embeddedServiceHelpButton,
        .helpButton {
            display: none !important;
        }

        /* Per le versioni web component (MIAW) */
        embeddedservice-bootstrap-chat-launch-button {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
        /* CONTAINER PER I BOTTONI */
        .floating-contact-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column-reverse; /* Mette il primo elemento in basso */
            gap: 15px; /* Spazio tra i bottoni */
            z-index: 9999;
        }

        /* STILE GENERALE BOTTONI */
        .float-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            transition: transform 0.3s ease;
            text-decoration: none; /* Per il link di whatsapp */
        }

        .float-btn:hover {
            transform: scale(1.1); /* Ingrandisce leggermente al passaggio del mouse */
        }

        /* STILE SPECIFICO WHATSAPP */
        .whatsapp-btn {
            background-color: #25D366;
        }

        /* STILE SPECIFICO AGENTFORCE */
        .agent-btn {
            background-color: #0070d2; /* Blu Salesforce, o usa il verde del tuo brand */
        }

        /* Se usi l'immagine dentro il bottone Agentforce */
        .agent-btn img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div><i class="fa-regular fa-envelope"></i> E-MAIL</div>
        <div><i class="fa-solid fa-location-dot"></i> DOVE SIAMO</div>
    </div>

    <header>
        <div class="logo-container">
            <img src="logo-1.png" alt="Aranzulla Diagnostica Logo">
        </div>
        <nav>
            <ul>
                <li>HOME</li>
                <li>CHI SIAMO</li>
                <li>LE SEDI <i class="fa-solid fa-chevron-down"></i></li>
                <li>SERVIZI <i class="fa-solid fa-chevron-down"></i></li>
                <li>CONVENZIONI</li>
                <li>CONTATTI</li>
                <li>PRENOTA</li>
                <li>REFERTI ONLINE</li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Molto più di un centro medico</h1>
    </section>

    <div class="bottom-bar">
        <div class="bottom-item">
            <i class="fa-solid fa-location-dot"></i>
            <span>Catania<br>Zafferana Etnea</span>
        </div>
        <div class="bottom-item">
            <i class="fa-regular fa-envelope"></i>
            <span>Email</span>
        </div>
        <div class="bottom-item">
            <i class="fa-regular fa-calendar"></i>
            <span>Prenota</span>
        </div>
    </div>

    <div id="embeddedMessagingIconContainer">
        <div id="agentforce-trigger" class="whatsapp-float" title="Chatta con il supporto">
            <i class="fa-brands fa-whatsapp"></i>
        </div>
            
        <div class="accessibility-float">
            <i class="fa-solid fa-wheelchair-move"></i>
        </div>
    </div>

    <!-- CODICE AGGIORNATO CON NUOVO ORG E URL, MANTENENDO LA LOGICA DI CONTROLLO E FALLOBACK -->
    <script type='text/javascript'>
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'it'; 

                embeddedservice_bootstrap.init(
                    '00DHu00000uSpSk',
                    'MustEnergiaChat',
                    'https://at1766405648944.my.site.com/ESWMustEnergiaChat1767608257336',
                    {
                        scrt2URL: 'https://at1766405648944.my.salesforce-scrt.com'
                    }
                );
            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };
    </script>
    <script type='text/javascript' src='https://at1766405648944.my.site.com/ESWMustEnergiaChat1767608257336/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

    <script>
        document.getElementById('agentforce-trigger').addEventListener('click', function() {
            try {
                // Tenta di aprire la chat usando l'API standard di Salesforce MIAW
                embeddedservice_bootstrap.utilAPI.launchChat();
            } catch (e) {
                console.log("Chat API non ancora pronta o errore: " + e);
                // Fallback: simula il click sul bottone nascosto (se esiste)
                const sfButton = document.querySelector('.embeddedServiceHelpButton .uiButton');
                if(sfButton) sfButton.click();
            }
        });
    </script>

</body>
</html>
