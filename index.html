<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aranzulla Diagnostica - Demo Agentforce</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VARIABILI COLORI BASE DAL SITO ORIGINALE --- */
        :root {
            --aranzulla-green: #74b5a1; /* Verde salvia del logo e footer */
            --aranzulla-dark: #2c3e45;  /* Grigio scuro dell'header */
            --aranzulla-top: #223136;   /* Grigio scurissimo della top bar */
            --text-light: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* --- TOP BAR PICCOLA --- */
        .top-bar {
            background-color: var(--aranzulla-top);
            color: var(--text-light);
            font-size: 11px;
            padding: 5px 30px;
            display: flex;
            justify-content: flex-end;
            gap: 20px;
        }
        .top-bar div { display: flex; align-items: center; gap: 5px; cursor: pointer; }

        /* --- HEADER E NAVIGAZIONE --- */
        header {
            background-color: var(--aranzulla-dark);
            height: 80px;
            display: flex;
            align-items: stretch;
        }

        .logo-container {
            background-color: var(--aranzulla-green);
            width: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }
        
        /* Stile per l'immagine del logo */
        .logo-container img {
            max-width: 80%;
            height: auto;
        }

        nav {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 20px;
        }

        nav ul li {
            color: var(--text-light);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
        }
        
        nav ul li i { margin-left: 3px; font-size: 9px; }

        /* --- HERO SECTION CON IMMAGINE ORIGINALE --- */
        .hero {
            flex-grow: 1;
            /* Inserita l'immagine originale della clinica con un filtro scuro per far leggere il testo */
            background-image: linear-gradient(rgba(44, 62, 69, 0.6), rgba(44, 62, 69, 0.4)), url('DSC7469_1.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 60px;
            position: relative;
        }

        .hero h1 {
            color: white;
            font-size: 42px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0;
        }

        /* --- BOTTOM BAR VERDE --- */
        .bottom-bar {
            background-color: var(--aranzulla-green);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 20px 0;
            color: white;
        }

        .bottom-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            text-align: center;
        }

        .bottom-item i { font-size: 24px; }
        .bottom-item span { font-size: 13px; font-weight: 400; line-height: 1.4;}

        /* --- BOTTONE WHATSAPP FAKE --- */
        .whatsapp-float {
            position: fixed;
            width: 55px;
            height: 55px;
            bottom: 80px; 
            right: 30px;
            background-color: #64d448; 
            color: #FFF;
            border-radius: 5px; 
            text-align: center;
            font-size: 35px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease;
        }

        .whatsapp-float:hover {
            transform: scale(1.05);
        }

        /* Icona accessibilità finta sotto WA */
        .accessibility-float {
            position: fixed;
            width: 40px;
            height: 40px;
            bottom: 30px;
            right: 38px;
            background-color: white;
            color: var(--aranzulla-green);
            border-radius: 5px;
            text-align: center;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
            z-index: 999;
        }

        /* Nascondi il widget standard di Salesforce */
        #embeddedMessagingIconContainer, 
        .embeddedMessagingIconContainer {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div><i class="fa-regular fa-envelope"></i> E-MAIL</div>
        <div><i class="fa-solid fa-location-dot"></i> DOVE SIAMO</div>
    </div>

    <header>
        <div class="logo-container">
            <img src="logo-1.png" alt="Aranzulla Diagnostica Logo">
        </div>
        <nav>
            <ul>
                <li>HOME</li>
                <li>CHI SIAMO</li>
                <li>LE SEDI <i class="fa-solid fa-chevron-down"></i></li>
                <li>SERVIZI <i class="fa-solid fa-chevron-down"></i></li>
                <li>CONVENZIONI</li>
                <li>CONTATTI</li>
                <li>PRENOTA</li>
                <li>REFERTI ONLINE</li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <h1>Molto più di un centro medico</h1>
    </section>

    <div class="bottom-bar">
        <div class="bottom-item">
            <i class="fa-solid fa-location-dot"></i>
            <span>Catania<br>Zafferana Etnea</span>
        </div>
        <div class="bottom-item">
            <i class="fa-regular fa-envelope"></i>
            <span>Email</span>
        </div>
        <div class="bottom-item">
            <i class="fa-regular fa-calendar"></i>
            <span>Prenota</span>
        </div>
    </div>

    <div class="whatsapp-float" onclick="openSalesforceChat()">
        <i class="fa-brands fa-whatsapp"></i>
    </div>
    
    <div class="accessibility-float">
        <i class="fa-solid fa-wheelchair-move"></i>
    </div>

    <script type='text/javascript'>
        function initEmbeddedMessaging() {
            try {
                //embeddedservice_bootstrap.settings.language = 'en_US'; // For example, enter 'en' or 'en-US'
                embeddedservice_bootstrap.settings.language = 'it'; 

                embeddedservice_bootstrap.init(
                    '00DHs00000T7y8g',
                    'Agente_di_Supporto',
                    'https://at1773661962975.my.site.com/ESWAgentediSupporto1773747769959',
                    {
                        scrt2URL: 'https://at1773661962975.my.salesforce-scrt.com'
                    }
                );
                console.log('Embedded Messaging initialized successfully.');
            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };
    </script>
    <script type='text/javascript' src='https://at1773661962975.my.site.com/ESWAgentediSupporto1773747769959/assets/js/bootstrap.min.js' onload='initEmbeddedMessaging()'></script>

    <script>
        // Funzione per avviare la chat Salesforce
        function openSalesforceChat() {
            console.log("Tentativo di apertura chat Salesforce...");
            
            try {
                // Controlla se le API della nuova chat (MIAW) sono caricate
                if (typeof embeddedservice_bootstrap !== 'undefined') {
                    console.log("API trovate. Lancio la chat...");
                    embeddedservice_bootstrap.utilAPI.launchChat()
                        .then(() => console.log("Chat aperta con successo."))
                        .catch((err) => {
                            console.error("Errore nell'apertura della chat: ", err);
                            alert("Si è verificato un problema nell'apertura della chat. Riprova più tardi.");
                        });
                } else {
                    // Se non sono caricate, diamo un avviso all'utente
                    console.warn("L'oggetto embeddedservice_bootstrap non è ancora definito.");
                    alert("Il sistema di assistenza si sta connettendo. Attendi qualche secondo e riprova.");
                }
            } catch (error) {
                console.error("Errore critico durante l'esecuzione dello script: ", error);
                alert("Errore imprevisto. Contatta il supporto tecnico.");
            }
        }

        // Aggiungi un listener per ascoltare quando Salesforce ha finito di caricare
        window.addEventListener("onEmbeddedMessagingReady", () => {
            console.log("Salesforce Messaging for Web è PRONTO e in ascolto!");
        });
    </script>

</body>
</html>
